        <rect x="108" y="120" width="32" height="32" rx="4" fill="#eee" stroke="#ccc"/>
        <text x="124" y="141" text-anchor="middle" font-size="12" fill="#666">1</text>
        <rect x="148" y="120" width="32" height="32" rx="4" fill="#eee" stroke="#ccc"/>
